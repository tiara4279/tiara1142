name: daily-liquidity-dashboard

on:
  schedule:
    - cron: '10 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate dashboard
        run: python daily_liquidity_dashboard.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html .nojekyll docs/index.html docs/404.html docs/.nojekyll docs/latest_metrics.json public/index.html public/404.html public/.nojekyll public/latest_metrics.json data/latest_metrics.json
          git diff --cached --quiet || git commit -m "chore: daily liquidity dashboard update"
          git push
